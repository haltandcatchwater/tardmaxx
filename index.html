<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>TardMaxx</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- SVG Icon Library -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="ic-plus" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></symbol>
    <symbol id="ic-folder" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></symbol>
    <symbol id="ic-save" viewBox="0 0 24 24"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3zm3-10H5V5h10v4z"/></symbol>
    <symbol id="ic-download" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></symbol>
    <symbol id="ic-undo" viewBox="0 0 24 24"><path d="M12.5 8c-2.6 0-5 .9-6.9 2.6L2 7v9h9l-3.6-3.6C8.7 11 10.5 10 12.5 10c3 0 5.5 2 6.2 4.7l1.8-.5C19.7 10.7 16.4 8 12.5 8z"/></symbol>
    <symbol id="ic-redo" viewBox="0 0 24 24"><path d="M18.4 10.6C16.6 8.9 14.2 8 11.5 8c-3.9 0-7.2 2.7-8 6.5L5.3 15c.7-2.5 3.1-4.2 5.7-4.2 2 0 3.8.9 5.1 2.4L12 17h9V8l-2.6 2.6z"/></symbol>
    <symbol id="ic-add-child" viewBox="0 0 24 24"><path d="M12 2L2 19h20L12 2zm0 3.8L18.7 17H5.3L12 5.8z"/><rect x="10" y="9" width="4" height="10" rx="1"/></symbol>
    <symbol id="ic-add-sibling" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="2" rx="1"/></symbol>
    <symbol id="ic-trash" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></symbol>
    <symbol id="ic-edit" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></symbol>
    <symbol id="ic-layout" viewBox="0 0 24 24"><circle cx="12" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M12 8v4M10 12l-2 4M14 12l2 4" stroke="currentColor" stroke-width="2" fill="none"/></symbol>
    <symbol id="ic-zoomin" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M12 10h-2v2H9v-2H7V9h2V7h1v2h2v1z"/></symbol>
    <symbol id="ic-zoomout" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9h5v1H7V9z"/></symbol>
    <symbol id="ic-fit" viewBox="0 0 24 24"><path d="M3 5v4h2V5h4V3H5c-1.1 0-2 .9-2 2zm2 10H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm14 4h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zm0-16h-4v2h4v4h2V5c0-1.1-.9-2-2-2z"/></symbol>
    <symbol id="ic-image" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></symbol>
    <symbol id="ic-pdf" viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.23 1.5-.67 2.01-.37.43-.86.64-1.33.49V9.5h2zm3.5 1.5c-.55 0-1 .45-1 1v2c0 .55.45 1 1 1h.5v-1.5H16v-1h-1V10h.5c.28 0 .5-.22.5-.5v-.5c0-.55-.45-1-1-1h-1.5v.5h1v1H15zm-7 0H6.5V9H5v6h1.5v-2H8c.55 0 1-.45 1-1v-1c0-.55-.45-1-1-1zm10 4H4V4h16v14z"/></symbol>
    <symbol id="ic-import" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></symbol>
    <symbol id="ic-settings" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.33-.02-.64-.06-.94l2.02-1.58c.18-.14.23-.38.12-.56l-1.89-3.28c-.12-.19-.36-.26-.56-.18l-2.38.96c-.5-.38-1.06-.68-1.66-.88L14.45 3.5c-.04-.2-.2-.34-.4-.34h-3.78c-.2 0-.36.14-.4.34l-.3 2.52c-.6.2-1.16.5-1.66.88l-2.38-.96c-.2-.08-.44-.01-.56.18l-1.89 3.28c-.12.18-.07.42.12.56l2.02 1.58c-.04.3-.06.61-.06.94 0 .33.02.64.06.94l-2.02 1.58c-.18.14-.23.38-.12.56l1.89 3.28c.12.19.36.26.56.18l2.38-.96c.5.38 1.06.68 1.66.88l.3 2.52c.04.2.2.34.4.34h3.78c.2 0 .36-.14.4-.34l.3-2.52c.6-.2 1.16-.5 1.66-.88l2.38.96c.2.08.44.01.56-.18l1.89-3.28c.12-.18.07-.42-.12-.56l-2.02-1.58zM12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></symbol>
    <symbol id="ic-palette" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></symbol>
    <symbol id="ic-props" viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></symbol>
    <symbol id="ic-collapse" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></symbol>
    <symbol id="ic-menu" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></symbol>
  </svg>

  <div id="app">
    <!-- Left Sidebar -->
    <div id="sidebar-left">
      <div class="sl-header">
        <button class="sl-btn" id="btn-collapse-sidebar" title="Collapse sidebar">
          <svg><use href="#ic-collapse"/></svg>
        </button>
        <span id="project-title" title="Click to rename">Untitled</span>
      </div>

      <!-- AI Prompt -->
      <div class="sl-section">
        <button class="sl-btn" id="btn-ai-ask" style="background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;border:none;margin-bottom:2px;font-weight:600;">
          <svg><use href="#ic-plus"/></svg><span>TardMaxx</span>
        </button>
      </div>

      <!-- Projects section -->
      <div class="sl-section">
        <div class="sl-section-title">Projects</div>
        <input type="text" id="project-search" placeholder="Filter...">
        <div class="sl-project-list" id="project-list"></div>
      </div>

      <!-- File actions -->
      <div class="sl-section">
        <div class="sl-section-title">File</div>
        <button class="sl-btn" id="btn-new" title="New (Ctrl+N)"><svg><use href="#ic-plus"/></svg><span>New</span></button>
        <button class="sl-btn" id="btn-open" title="Open (Ctrl+O)"><svg><use href="#ic-folder"/></svg><span>Open</span></button>
        <button class="sl-btn" id="btn-save" title="Save (Ctrl+S)"><svg><use href="#ic-save"/></svg><span>Save</span></button>
        <button class="sl-btn" id="btn-save-file" title="Download file"><svg><use href="#ic-download"/></svg><span>Download</span></button>
      </div>

      <!-- Edit actions -->
      <div class="sl-section">
        <div class="sl-section-title">Edit</div>
        <button class="sl-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled><svg><use href="#ic-undo"/></svg><span>Undo</span></button>
        <button class="sl-btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled><svg><use href="#ic-redo"/></svg><span>Redo</span></button>
        <div class="sl-sep"></div>
        <button class="sl-btn" id="btn-add-child" title="Add child (Tab)"><svg><use href="#ic-add-child"/></svg><span>Add Child</span></button>
        <button class="sl-btn" id="btn-add-sibling" title="Add sibling (Enter)"><svg><use href="#ic-add-sibling"/></svg><span>Add Sibling</span></button>
        <button class="sl-btn" id="btn-edit-node" title="Edit text (F2)" disabled><svg><use href="#ic-edit"/></svg><span>Edit Text</span></button>
        <button class="sl-btn danger" id="btn-delete-node" title="Delete (Del)" disabled><svg><use href="#ic-trash"/></svg><span>Delete</span></button>
      </div>

      <!-- View actions -->
      <div class="sl-section">
        <div class="sl-section-title">View</div>
        <button class="sl-btn" id="btn-auto-layout" title="Auto-layout (Ctrl+L)"><svg><use href="#ic-layout"/></svg><span>Auto Layout</span></button>
        <button class="sl-btn" id="btn-zoom-in" title="Zoom in"><svg><use href="#ic-zoomin"/></svg><span>Zoom In</span></button>
        <button class="sl-btn" id="btn-zoom-out" title="Zoom out"><svg><use href="#ic-zoomout"/></svg><span>Zoom Out</span></button>
        <button class="sl-btn" id="btn-zoom-fit" title="Fit all (Ctrl+0)"><svg><use href="#ic-fit"/></svg><span>Fit All</span></button>
      </div>

      <!-- Export / Import -->
      <div class="sl-section">
        <div class="sl-section-title">Export</div>
        <button class="sl-btn" id="btn-export-png"><svg><use href="#ic-image"/></svg><span>PNG Image</span></button>
        <button class="sl-btn" id="btn-export-jpg"><svg><use href="#ic-image"/></svg><span>JPEG Image</span></button>
        <button class="sl-btn" id="btn-export-pdf"><svg><use href="#ic-pdf"/></svg><span>PDF</span></button>
        <button class="sl-btn" id="btn-export-md"><svg><use href="#ic-save"/></svg><span>Markdown</span></button>
        <button class="sl-btn" id="btn-import-file"><svg><use href="#ic-import"/></svg><span>Import File</span></button>
      </div>

      <!-- Bottom -->
      <div class="sl-section sl-bottom">
        <button class="sl-btn" id="btn-toggle-sidebar"><svg><use href="#ic-props"/></svg><span>Properties</span></button>
        <button class="sl-btn" id="btn-settings"><svg><use href="#ic-settings"/></svg><span>Settings</span></button>
        <select class="sl-select" id="theme-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="forest">Forest</option>
          <option value="ocean">Ocean</option>
          <option value="sunset">Sunset</option>
        </select>
        <select class="sl-select" id="model-switcher" style="margin-top:4px;">
        </select>
      </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace">
      <svg id="mindmap-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="node-shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
          </filter>
        </defs>
        <g id="connections-layer"></g>
        <g id="nodes-layer"></g>
      </svg>

      <!-- Deep Dive Overlay Panel -->
      <div id="dive-panel">
        <div class="sidebar-header">
          <span id="dive-panel-title">🤿 Deep Dive</span>
          <button class="sidebar-close-btn" id="btn-close-dive">&times;</button>
        </div>
        <div class="sidebar-body" id="dive-panel-body" style="white-space:pre-wrap;line-height:1.6;font-size:14px;overflow-y:auto;flex:1;min-height:0;"></div>
      </div>

      <!-- Node Properties Panel (right) -->
      <div id="sidebar">
        <div class="sidebar-header">Node Properties<button class="sidebar-close-btn" id="btn-close-sidebar">&times;</button></div>
        <div class="sidebar-body"><div class="sidebar-section" id="sidebar-content"></div></div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span id="status-nodes">Nodes: 1</span>
      <span id="status-selected">Selected: none</span>
      <span id="status-zoom">Zoom: 100%</span>
      <span id="status-modified" style="display:none;color:var(--warning)">● Unsaved</span>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="ctx-item" data-action="edit">Edit Text <span class="shortcut-hint">F2</span></div>
    <div class="ctx-item" data-action="add-child">Add Child <span class="shortcut-hint">Tab</span></div>
    <div class="ctx-item" data-action="add-sibling">Add Sibling <span class="shortcut-hint">Enter</span></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="cut">Cut <span class="shortcut-hint">Ctrl+X</span></div>
    <div class="ctx-item" data-action="copy">Copy <span class="shortcut-hint">Ctrl+C</span></div>
    <div class="ctx-item" data-action="paste">Paste <span class="shortcut-hint">Ctrl+V</span></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="add-image">Add Image</div>
    <div class="ctx-item" data-action="add-file">🔗 Link File</div>
    <div class="ctx-item" data-action="change-color">Change Color</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="collapse">Collapse/Expand</div>
    <div class="ctx-item" data-action="delete" style="color:var(--danger)">Delete <span class="shortcut-hint">Del</span></div>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-header"><span id="modal-title"></span><button class="modal-close-btn" id="modal-close">&times;</button></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="config.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
